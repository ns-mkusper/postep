name: mobile-e2e

on:
  pull_request:
  workflow_dispatch:

jobs:
  android-maestro:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    env:
      EXPO_PUBLIC_POSTEP_E2E: "1"
      CI: "1"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: apps/mobile/package-lock.json

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Maestro
        run: |
          curl -Ls "https://get.maestro.mobile.dev" | bash
          echo "$HOME/.maestro/bin" >> "$GITHUB_PATH"

      - name: Install mobile dependencies
        working-directory: apps/mobile
        run: npm ci --legacy-peer-deps

      - name: Typecheck mobile app
        working-directory: apps/mobile
        run: npm run typecheck

      - name: Generate Android project
        working-directory: apps/mobile
        run: npm run e2e:android:prebuild

      - name: Cache Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Run Maestro Android E2E
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 30
          target: default
          arch: x86_64
          profile: Nexus 6
          emulator-options: -no-window -gpu swiftshader_indirect -no-snapshot -noaudio -no-boot-anim -camera-back none
          disable-animations: true
          script: |
            set -eu
            cd apps/mobile
            adb reverse tcp:8081 tcp:8081
            EXPO_PUBLIC_POSTEP_E2E=1 CI=1 npx expo start --clear --host localhost > /tmp/postep-expo.log 2>&1 &
            METRO_PID=$!
            trap 'kill $METRO_PID || true; cat /tmp/postep-expo.log || true' EXIT
            npx wait-on@7.2.0 tcp:127.0.0.1:8081
            EXPO_PUBLIC_POSTEP_E2E=1 npm run e2e:android:install
            adb shell monkey -p com.postep.mobile 1
            maestro test e2e/maestro
