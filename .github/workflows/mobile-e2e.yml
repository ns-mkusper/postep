name: mobile-ui-automation

on:
  pull_request:
  workflow_dispatch:

permissions:
  contents: write
  issues: write
  pull-requests: write
  actions: read

jobs:
  storage-regression:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      CI: "1"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install mobile dependencies
        working-directory: apps/mobile
        run: npm install --legacy-peer-deps

      - name: Typecheck mobile storage paths
        working-directory: apps/mobile
        run: npm run typecheck

      - name: Run SAF and agenda storage regressions
        working-directory: apps/mobile
        run: npm run test:storage

  android-native-build:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      EXPO_PUBLIC_POSTEP_E2E: "1"
      CI: "1"
      JAVA_OPTS: "-Dsun.net.client.defaultConnectTimeout=60000 -Dsun.net.client.defaultReadTimeout=60000"
      GRADLE_OPTS: "-Dorg.gradle.daemon=false -Dorg.gradle.jvmargs=-Xmx4g -Dsun.net.client.defaultConnectTimeout=60000 -Dsun.net.client.defaultReadTimeout=60000"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install mobile dependencies
        working-directory: apps/mobile
        run: npm install --legacy-peer-deps

      - name: Generate Android native project
        working-directory: apps/mobile
        run: npm run e2e:android:prebuild

      - name: Cache Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build Android debug APK
        working-directory: apps/mobile
        run: npm run e2e:android:build

      - name: Verify APK artifact
        working-directory: apps/mobile
        run: |
          test -s android/app/build/outputs/apk/debug/app-debug.apk
          ls -lh android/app/build/outputs/apk/debug/app-debug.apk

      - name: Upload Android debug APK
        uses: actions/upload-artifact@v4
        with:
          name: postep-android-debug-apk
          path: apps/mobile/android/app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error

  android-release-build:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    env:
      CI: "1"
      JAVA_OPTS: "-Dsun.net.client.defaultConnectTimeout=60000 -Dsun.net.client.defaultReadTimeout=60000"
      GRADLE_OPTS: "-Dorg.gradle.daemon=false -Dorg.gradle.jvmargs=-Xmx4g -Dsun.net.client.defaultConnectTimeout=60000 -Dsun.net.client.defaultReadTimeout=60000"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install mobile dependencies
        working-directory: apps/mobile
        run: npm install --legacy-peer-deps

      - name: Generate Android native project
        working-directory: apps/mobile
        run: npm run android:standalone:prebuild

      - name: Cache Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build Android release APK
        working-directory: apps/mobile
        run: npm run android:standalone:build

      - name: Verify release APK artifact
        working-directory: apps/mobile
        run: |
          test -s android/app/build/outputs/apk/release/app-release.apk
          ls -lh android/app/build/outputs/apk/release/app-release.apk

      - name: Upload Android release APK
        uses: actions/upload-artifact@v4
        with:
          name: postep-android-release-apk
          path: apps/mobile/android/app/build/outputs/apk/release/app-release.apk
          if-no-files-found: error

  launched-web-e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      EXPO_PUBLIC_POSTEP_E2E: "1"
      CI: "1"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install mobile dependencies
        working-directory: apps/mobile
        run: npm install --legacy-peer-deps

      - name: Install Playwright browser
        working-directory: apps/mobile
        run: npx playwright install chromium

      - name: Typecheck mobile app
        working-directory: apps/mobile
        run: npm run typecheck

      - name: Run tight UX interaction budgets
        working-directory: apps/mobile
        run: npm run test:ux

      - name: Run launched UI workflow
        working-directory: apps/mobile
        run: |
          npm run e2e:web:build
          npm run e2e:web

      - name: Upload launched UI screenshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: launched-ui-screenshots
          path: apps/mobile/e2e-artifacts/screenshots
          if-no-files-found: error

      - name: Upload Playwright traces
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: launched-ui-playwright-traces
          path: apps/mobile/test-results
          if-no-files-found: ignore

  android-emulator-screenshots:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    if: github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository
    env:
      EXPO_PUBLIC_POSTEP_E2E: "1"
      CI: "1"
      JAVA_OPTS: "-Dsun.net.client.defaultConnectTimeout=60000 -Dsun.net.client.defaultReadTimeout=60000"
      GRADLE_OPTS: "-Dorg.gradle.daemon=false -Dorg.gradle.jvmargs=-Xmx4g -Dsun.net.client.defaultConnectTimeout=60000 -Dsun.net.client.defaultReadTimeout=60000"
    steps:
      - name: Checkout PR head
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event.pull_request.head.sha }}

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Enable KVM access
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm || true

      - name: Cache Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Install head mobile dependencies
        working-directory: apps/mobile
        run: npm install --legacy-peer-deps

      - name: Generate head Android native project
        working-directory: apps/mobile
        run: npm run e2e:android:prebuild

      - name: Build head Android debug APK
        working-directory: apps/mobile
        run: npm run e2e:android:build

      - name: Create base worktree
        run: |
          set -euo pipefail
          git worktree add ../postep-base "${{ github.event.pull_request.base.sha }}"
          mkdir -p apps/mobile/e2e-artifacts/apks
          cp apps/mobile/android/app/build/outputs/apk/debug/app-debug.apk apps/mobile/e2e-artifacts/apks/head-app-debug.apk
          cp apps/mobile/e2e/capture-android-screenshots.sh ../postep-base/apps/mobile/e2e/capture-android-screenshots.sh

      - name: Install base mobile dependencies
        working-directory: ../postep-base/apps/mobile
        run: npm install --legacy-peer-deps

      - name: Generate base Android native project
        working-directory: ../postep-base/apps/mobile
        run: npm run e2e:android:prebuild

      - name: Build base Android debug APK
        working-directory: ../postep-base/apps/mobile
        run: npm run e2e:android:build

      - name: Free disk space before emulator capture
        run: |
          set -euo pipefail
          mkdir -p apps/mobile/e2e-artifacts/apks
          cp ../postep-base/apps/mobile/android/app/build/outputs/apk/debug/app-debug.apk apps/mobile/e2e-artifacts/apks/base-app-debug.apk
          echo "Disk usage before cleanup:"
          df -h
          du -sh apps/mobile/android ../postep-base/apps/mobile/android ~/.gradle ~/.npm 2>/dev/null || true
          rm -rf \
            apps/mobile/android \
            ../postep-base/apps/mobile/android \
            ~/.gradle/caches \
            ~/.gradle/wrapper \
            ~/.npm/_cacache
          sudo rm -rf \
            "$ANDROID_HOME/system-images" \
            /usr/share/dotnet \
            /usr/local/share/boost \
            /opt/ghc \
            /usr/local/.ghcup \
            /opt/hostedtoolcache/CodeQL
          docker image prune -af || true
          echo "Disk usage after cleanup:"
          df -h

      - name: Capture before and after emulator screenshots
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 35
          target: default
          arch: x86_64
          profile: pixel_6
          disable-animations: true
          script: |
            bash -euo pipefail -c 'APP_SOURCE_DIR="${{ github.workspace }}/../postep-base/apps/mobile" SCREENSHOT_DIR="${{ github.workspace }}/apps/mobile/e2e-artifacts/android-screenshots-before" METRICS_DIR="${{ github.workspace }}/apps/mobile/e2e-artifacts/android-performance-before" APK_PATH="${{ github.workspace }}/apps/mobile/e2e-artifacts/apks/base-app-debug.apk" METRO_PORT=8081 EXPO_LOG=/tmp/postep-base-expo-screenshots.log bash "${{ github.workspace }}/apps/mobile/e2e/capture-android-screenshots.sh"'
            adb shell am force-stop com.postep.mobile || true
            bash -euo pipefail -c 'SCREENSHOT_DIR="${{ github.workspace }}/apps/mobile/e2e-artifacts/android-screenshots-after" METRICS_DIR="${{ github.workspace }}/apps/mobile/e2e-artifacts/android-performance-after" ANDROID_STRICT_DOCUMENT_ASSERTIONS=1 ANDROID_ENFORCE_PERFORMANCE_BUDGETS=1 APK_PATH="${{ github.workspace }}/apps/mobile/e2e-artifacts/apks/head-app-debug.apk" METRO_PORT=8081 EXPO_LOG=/tmp/postep-head-expo-screenshots.log bash "${{ github.workspace }}/apps/mobile/e2e/capture-android-screenshots.sh"'

      - name: Compare Android emulator screenshots
        if: always()
        working-directory: apps/mobile
        run: |
          if [[ -d e2e-artifacts/android-screenshots-before && -d e2e-artifacts/android-screenshots-after ]]; then
            node e2e/compare-screenshots.mjs \
              e2e-artifacts/android-screenshots-before \
              e2e-artifacts/android-screenshots-after \
              e2e-artifacts/android-screenshots-diff
          fi

      - name: Upload Android emulator screenshot comparison
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: android-emulator-screenshot-comparison
          path: |
            apps/mobile/e2e-artifacts/android-screenshots-before
            apps/mobile/e2e-artifacts/android-screenshots-after
            apps/mobile/e2e-artifacts/android-screenshots-diff
            apps/mobile/e2e-artifacts/android-performance-before
            apps/mobile/e2e-artifacts/android-performance-after
          if-no-files-found: error

      - name: Publish screenshots branch
        id: publish
        if: always() && hashFiles('apps/mobile/e2e-artifacts/android-screenshots-after/*.png') != ''
        run: |
          set -euo pipefail
          PR_NUMBER="${{ github.event.pull_request.number }}"
          SOURCE_SHA="${{ github.event.pull_request.head.sha }}"
          SCREENSHOT_BRANCH="pr-${PR_NUMBER}-android-screenshots"
          DEST_DIR="android-emulator-screenshots/${SOURCE_SHA}"
          TMP_DIR="$(mktemp -d)"
          mkdir -p "${TMP_DIR}/screenshots"
          cp -R apps/mobile/e2e-artifacts/android-screenshots-before "${TMP_DIR}/screenshots/before"
          cp -R apps/mobile/e2e-artifacts/android-screenshots-after "${TMP_DIR}/screenshots/after"
          if [[ -d apps/mobile/e2e-artifacts/android-screenshots-diff ]]; then
            cp -R apps/mobile/e2e-artifacts/android-screenshots-diff "${TMP_DIR}/screenshots/diff"
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git checkout --orphan "${SCREENSHOT_BRANCH}"
          git rm -rf . >/dev/null 2>&1 || true
          mkdir -p "${DEST_DIR}"
          cp -R "${TMP_DIR}/screenshots"/* "${DEST_DIR}/"
          git add "${DEST_DIR}"
          git commit -m "Add Android emulator screenshots for PR #${PR_NUMBER}"
          git push --force origin "HEAD:${SCREENSHOT_BRANCH}"

          echo "branch=${SCREENSHOT_BRANCH}" >> "$GITHUB_OUTPUT"
          echo "dir=${DEST_DIR}" >> "$GITHUB_OUTPUT"

      - name: Comment screenshots on PR
        if: always() && steps.publish.outputs.branch != ''
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          REPO: ${{ github.repository }}
          SCREENSHOT_BRANCH: ${{ steps.publish.outputs.branch }}
          SCREENSHOT_DIR: ${{ steps.publish.outputs.dir }}
          SOURCE_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          set -euo pipefail
          MARKER="<!-- postep-android-emulator-screenshots-pr-${PR_NUMBER} -->"
          RAW_BASE="https://raw.githubusercontent.com/${REPO}/${SCREENSHOT_BRANCH}/${SCREENSHOT_DIR}"
          BODY_FILE="$(mktemp)"
          {
            printf '%s\n' "${MARKER}"
            printf 'Android emulator before/after screenshots for commit `%s`:\n\n' "${SOURCE_SHA}"
            printf '| Screen | Before | After | Diff |\n'
            printf '| --- | --- | --- | --- |\n'

            while IFS= read -r after_path; do
              file="$(basename "$after_path")"
              base="${file%.png}"
              label="$(printf '%s' "$base" | sed -E 's/^[0-9]+-//; s/-/ /g; s/\b(.)/\u\1/g')"
              before_cell="—"
              diff_cell="—"
              if [[ -f "apps/mobile/e2e-artifacts/android-screenshots-before/${file}" ]]; then
                before_cell="![${label} before](${RAW_BASE}/before/${file})"
              fi
              if [[ -f "apps/mobile/e2e-artifacts/android-screenshots-diff/${base}.diff.png" ]]; then
                diff_cell="![${label} diff](${RAW_BASE}/diff/${base}.diff.png)"
              fi
              printf '| %s | %s | ![%s after](%s/after/%s) | %s |\n' \
                "$label" \
                "$before_cell" \
                "$label" \
                "$RAW_BASE" \
                "$file" \
                "$diff_cell"
            done < <(find apps/mobile/e2e-artifacts/android-screenshots-after -maxdepth 1 -type f -name '*.png' | sort)
          } > "$BODY_FILE"

          COMMENT_ID="$(gh api "repos/${REPO}/issues/${PR_NUMBER}/comments" --paginate --jq ".[] | select(.body | contains(\"${MARKER}\")) | .id" | tail -n 1)"
          BODY="$(cat "$BODY_FILE")"
          if [[ -n "$COMMENT_ID" ]]; then
            gh api -X PATCH "repos/${REPO}/issues/comments/${COMMENT_ID}" -f body="$BODY" >/dev/null
          else
            gh api -X POST "repos/${REPO}/issues/${PR_NUMBER}/comments" -f body="$BODY" >/dev/null
          fi
