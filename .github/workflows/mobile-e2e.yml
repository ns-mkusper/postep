name: mobile-ui-automation

on:
  pull_request:
  workflow_dispatch:

jobs:
  android-native-build:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      EXPO_PUBLIC_POSTEP_E2E: "1"
      CI: "1"
      JAVA_OPTS: "-Dsun.net.client.defaultConnectTimeout=60000 -Dsun.net.client.defaultReadTimeout=60000"
      GRADLE_OPTS: "-Dorg.gradle.daemon=false -Dorg.gradle.jvmargs=-Xmx4g -Dsun.net.client.defaultConnectTimeout=60000 -Dsun.net.client.defaultReadTimeout=60000"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: apps/mobile/package-lock.json

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install mobile dependencies
        working-directory: apps/mobile
        run: npm ci --legacy-peer-deps

      - name: Generate Android native project
        working-directory: apps/mobile
        run: npm run e2e:android:prebuild

      - name: Cache Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build Android debug APK
        working-directory: apps/mobile
        run: npm run e2e:android:build

      - name: Verify APK artifact
        working-directory: apps/mobile
        run: |
          test -s android/app/build/outputs/apk/debug/app-debug.apk
          ls -lh android/app/build/outputs/apk/debug/app-debug.apk

      - name: Upload Android debug APK
        uses: actions/upload-artifact@v4
        with:
          name: postep-android-debug-apk
          path: apps/mobile/android/app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error

  launched-web-e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      EXPO_PUBLIC_POSTEP_E2E: "1"
      CI: "1"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: apps/mobile/package-lock.json

      - name: Install mobile dependencies
        working-directory: apps/mobile
        run: npm ci --legacy-peer-deps

      - name: Install Playwright browser
        working-directory: apps/mobile
        run: npx playwright install chromium

      - name: Typecheck mobile app
        working-directory: apps/mobile
        run: npm run typecheck

      - name: Run tight UX interaction budgets
        working-directory: apps/mobile
        run: npm run test:ux

      - name: Run launched UI workflow
        working-directory: apps/mobile
        run: |
          npm run e2e:web:build
          npm run e2e:web

      - name: Upload launched UI screenshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: launched-ui-screenshots
          path: apps/mobile/e2e-artifacts/screenshots
          if-no-files-found: error

      - name: Upload Playwright traces
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: launched-ui-playwright-traces
          path: apps/mobile/test-results
          if-no-files-found: ignore
